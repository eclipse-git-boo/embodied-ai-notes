<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="270" viewBox="0 0 1100 270"><style>text{font-family:Arial,sans-serif;fill:#172033}.t{font-size:18px;font-weight:bold}.s{font-size:15px}.h{fill:#eff3fb;stroke:#6076a7;stroke-width:2}.r{fill:#fff8ec;stroke:#c78522;stroke-width:2}</style><text x="30" y="32" class="t">OmTrackVLA：官方 README 的 EVT-Bench 指标边界（重排）</text><rect x="35" y="70" width="310" height="150" rx="14" class="h"/><text x="70" y="113" class="t">STT（短时跟随）</text><text x="70" y="150" class="s">SR / TR / CR 分别报告</text><text x="70" y="178" class="s">不应只看成功率</text><rect x="395" y="70" width="310" height="150" rx="14" class="h"/><text x="430" y="113" class="t">DT（动态跟随）</text><text x="430" y="150" class="s">目标运动造成时序压力</text><text x="430" y="178" class="s">需同时读碰撞率</text><rect x="755" y="70" width="310" height="150" rx="14" class="r"/><text x="790" y="113" class="t">AT（综合跟踪）</text><text x="790" y="150" class="s">README：0.6B SR 60.04</text><text x="790" y="178" class="s">TR 73.89，CR 7.60</text></svg>
